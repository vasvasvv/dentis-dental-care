name = "dentis-site-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
workers_dev = true

[triggers]
crons = ["*/30 * * * *", "0 9 * * 1"]
# "0 * * * *"  — щогодини (для нагадувань про прийоми)
# "0 9 * * 1"  — щопонеділка о 09:00 UTC (для автопублікації статей)

[[d1_databases]]
binding = "DB"
database_name = "site_news_docs_pwa"
database_id = "707f01aa-a2d9-4cd8-be17-84f37a8d4c8b"

[[r2_buckets]]
binding = "DOCTORS_BUCKET"
bucket_name = "dentis-doctors"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1