    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      (function () {
        var analyticsLoaded = false;
        var events = ["pointerdown", "keydown", "touchstart", "scroll"];
        function removeListeners() {
          events.forEach(function (eventName) {
            window.removeEventListener(eventName, loadAnalytics);
          });
        }
        function loadAnalytics() {
          if (analyticsLoaded) return;
          analyticsLoaded = true;
          removeListeners();
          window.dataLayer.push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
          var firstScript = document.getElementsByTagName("script")[0];
          var gtmScript = document.createElement("script");
          gtmScript.async = true;
          gtmScript.src = "https://www.googletagmanager.com/gtm.js?id=GTM-MZ55QZFK";
          firstScript.parentNode.insertBefore(gtmScript, firstScript);
          var gaScript = document.createElement("script");
          gaScript.async = true;
          gaScript.src = "https://www.googletagmanager.com/gtag/js?id=G-8WNNDVF5QN";
          document.head.appendChild(gaScript);
          gtag("js", new Date());
          gtag("config", "G-8WNNDVF5QN");
        }
        function scheduleAnalytics() {
          if ("requestIdleCallback" in window) {
            window.requestIdleCallback(loadAnalytics, { timeout: 3000 });
          } else {
            window.setTimeout(loadAnalytics, 2500);
          }
        }
        events.forEach(function (eventName) {
          window.addEventListener(eventName, loadAnalytics, { once: true, passive: true });
        });
        if (document.readyState === "complete") {
          scheduleAnalytics();
        } else {
          window.addEventListener("load", scheduleAnalytics, { once: true });
        }
      })();
    </script>
